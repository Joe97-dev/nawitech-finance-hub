
# This file is used to configure your Supabase project.
# Learn more: https://supabase.com/docs/reference/cli/config

[storage]
[[storage.buckets]]
name = "client_photos"
public = true
file_size_limit = "5MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/jpg", "image/gif", "image/webp"]

[functions.admin-reset-password]
verify_jwt = false

[functions.process-migration]
verify_jwt = true

[functions.mpesa-c2b-validation]
verify_jwt = false

[functions.mpesa-c2b-confirmation]
verify_jwt = false

[functions.mpesa-register-urls]
verify_jwt = true

[functions.mpesa-simulate-c2b]
verify_jwt = true

